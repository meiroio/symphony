services:
  symphony:
    container_name: symphony-bun
    build:
      context: .
      dockerfile: Dockerfile
    image: symphony-bun:latest
    restart: unless-stopped
    environment:
      LINEAR_API_KEY: ${LINEAR_API_KEY:-}
      LINEAR_PIP_WEBHOOK_SECRET: ${LINEAR_PIP_WEBHOOK_SECRET:-}
      LINEAR_TIM_WEBHOOK_SECRET: ${LINEAR_TIM_WEBHOOK_SECRET:-}
      SYMPHONY_LOG_LEVEL: ${SYMPHONY_LOG_LEVEL:-info}
      SYMPHONY_DASHBOARD_HOST: ${SYMPHONY_DASHBOARD_HOST:-0.0.0.0}
      SYMPHONY_DASHBOARD_PORT: ${SYMPHONY_DASHBOARD_PORT:-8788}
    ports:
      - "8788:8788"
    volumes:
      - symphony_workspaces:/tmp/symphony-bun-workspaces
      - symphony_codex_home:/home/bun/.codex
      - symphony_gh_home:/home/bun/.config/gh
      - ${HOME}/.ssh:/home/bun/.ssh:ro
      - ${HOME}/.gitconfig:/home/bun/.gitconfig:ro

volumes:
  symphony_workspaces:
  symphony_codex_home:
  symphony_gh_home:
