name: make-all

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  make-all:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: cd bun && bun install --frozen-lockfile

      - name: Typecheck
        run: cd bun && bun run typecheck

      - name: Run tests
        run: cd bun && bun test
