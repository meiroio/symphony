name: pr-description-lint

on:
  pull_request:
    types: [opened, edited, reopened, synchronize, ready_for_review]

jobs:
  validate-pr-description:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: cd bun && bun install --frozen-lockfile

      - name: Validate PR description format
        env:
          PR_BODY_JSON: ${{ toJson(github.event.pull_request.body) }}
        run: |
          printf '%s' "$PR_BODY_JSON" | jq -r '.' > /tmp/pr_body.md
          cd bun && bun run check:pr-body --file /tmp/pr_body.md
